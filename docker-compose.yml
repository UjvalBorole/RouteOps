services:
  # 1. Database
  postgres:
    image: postgres:15-alpine
    container_name: routeops-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: routeops
    secrets:
      - db_password
    ports:
      - "5434:5432" # Accessible from Windows on port 5434
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - route-network

  # 2. C++ Routing Engine
  routing-engine:
    build: ./routing-engine
    container_name: routing-engine
    ports:
      - "18080:18080"
    networks:
      - route-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Java Backend
  gateway:
    build: ./gateway
    container_name: routeops-backend
    ports:
      - "8081:8081"
    environment:
      # Database settings - Use service name 'postgres' not container name
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/routeops
      SPRING_DATASOURCE_USERNAME: user

      # Routing Engine URL - Use service name 'routing_engine' and include /route endpoint
      # ROUTEOPS_ROUTING_URL: http://routing_engine:18080/route
      ROUTEOPS_ROUTING_URL: http://routing-engine:18080
      ROUTEOPS_FRONTEND_URL: http://frontend:4200
    secrets:
      - db_password
      - jwt_secret
    depends_on:
      - postgres
      - routing-engine
    networks:
      - route-network

  # 4. React Frontend
  frontend:
    build: ./reactjs
    container_name: routeops-frontend
    ports:
      - "4200:80" # Nginx listens on port 80 internally, we map it to 4200 externally
    depends_on:
      - gateway
    networks:
      - route-network
    environment:
      # Enable Nginx to forward API requests to gateway
      GATEWAY_URL: http://gateway:8081

volumes:
  postgres_data:

networks:
  route-network:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt