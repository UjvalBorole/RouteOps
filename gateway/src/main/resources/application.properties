spring.application.name=gateway
server.port=8081
spring.jpa.open-in-view=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:routeops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

routeops.routing.url=http://localhost:18080/route
management.endpoints.web.exposure.include=*

application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:c2VjdXJlX2pkdF9kZWZhdWx0X2tleV8xMjM0NTY3ODk=}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

debug=true