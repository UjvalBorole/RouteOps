# --- TEST CONFIGURATION (H2) ---

# Special URL for in-memory H2.
# DB_CLOSE_DELAY=-1 keeps the database open while the tests are running.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Default driver and user
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tell Hibernate to use the H2 dialect instead of Postgres
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Recreate the database schema for each test run
spring.jpa.hibernate.ddl-auto=create-drop
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

routeops.routing.url=http://localhost:18080
