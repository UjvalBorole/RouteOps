
#========================================================
# MAIN USER
#========================================================

# Linux user running nginx workers
user nginx;

# Auto = number of CPU cores
worker_processes auto;

# Store worker PID
pid /var/run/nginx.pid;

#========================================================
# EVENTS BLOCK
#========================================================

events {

    # Max simultaneous connections per worker
    # Example:
    # 32 workers × 65535 = 2M+ connections
    worker_connections 65535;

    # Use epoll on Linux
    # epoll = high scalability event notification
    use epoll;

    # Accept multiple new connections together
    multi_accept on;
}

#========================================================
# HTTP BLOCK
#========================================================

http {

    #====================================================
    # BASIC OPTIMIZATION
    #====================================================

    include       /etc/nginx/mime.types;

    default_type  application/octet-stream;

    # Zero-copy optimization
    sendfile on;

    # Reduce packet overhead
    tcp_nopush on;

    # Reduce latency
    tcp_nodelay on;

    # Keepalive timeout
    keepalive_timeout 65;

    # Requests per keepalive connection
    keepalive_requests 100000;

    # Hash table optimization
    types_hash_max_size 4096;

    # Hide nginx version
    server_tokens off;

    #====================================================
    # BUFFER TUNING
    #====================================================

    client_body_buffer_size 128k;

    client_header_buffer_size 16k;

    large_client_header_buffers 8 64k;

    client_max_body_size 100m;

    #====================================================
    # FILE CACHE
    #====================================================

    open_file_cache max=500000 inactive=20s;

    open_file_cache_valid 30s;

    open_file_cache_min_uses 2;

    open_file_cache_errors on;

    #====================================================
    # LOG FORMAT
    #====================================================

    log_format main
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time '
    'uct="$upstream_connect_time" '
    'uht="$upstream_header_time" '
    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=512k flush=1s;

    error_log /var/log/nginx/error.log warn;

    #====================================================
    # GZIP COMPRESSION
    #====================================================

    gzip on;

    gzip_comp_level 5;

    gzip_min_length 256;

    gzip_proxied any;

    gzip_vary on;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    #====================================================
    # RATE LIMITING
    #====================================================

    # Per-IP request limiting
    limit_req_zone $binary_remote_addr
    zone=api_limit:50m
    rate=100r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr
    zone=conn_limit:50m;

    #====================================================
    # UPSTREAM MICROSERVICE CLUSTER
    #====================================================

    upstream auth_service {

        least_conn;

        # keepalive connection pool
        keepalive 512;

        server auth-1:8080 max_fails=3 fail_timeout=5s;
        server auth-2:8080 max_fails=3 fail_timeout=5s;
        server auth-3:8080 max_fails=3 fail_timeout=5s;
    }

    upstream trading_service {

        least_conn;

        keepalive 1024;

        server trade-1:8080 max_fails=2 fail_timeout=3s;
        server trade-2:8080 max_fails=2 fail_timeout=3s;
        server trade-3:8080 max_fails=2 fail_timeout=3s;
        server trade-4:8080 max_fails=2 fail_timeout=3s;
    }

    upstream portfolio_service {

        least_conn;

        keepalive 256;

        server portfolio-1:8080;
        server portfolio-2:8080;
    }

    #====================================================
    # CACHE
    #====================================================

    proxy_cache_path
    /var/cache/nginx
    levels=1:2
    keys_zone=STATIC_CACHE:1g
    max_size=20g
    inactive=60m
    use_temp_path=off;

    #====================================================
    # SSL SETTINGS
    #====================================================

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_prefer_server_ciphers on;

    ssl_session_cache shared:SSL:100m;

    ssl_session_timeout 1d;

    ssl_session_tickets off;

    #====================================================
    # MAIN SERVER
    #====================================================

    server {

        listen 443 ssl http2 reuseport;

        server_name api.nse-example.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;

        ssl_certificate_key /etc/nginx/ssl/private.key;

        #================================================
        # SECURITY HEADERS
        #================================================

        add_header X-Frame-Options DENY;

        add_header X-Content-Type-Options nosniff;

        add_header Referrer-Policy no-referrer;

        add_header X-XSS-Protection "1; mode=block";

        #================================================
        # GLOBAL RATE LIMITS
        #================================================

        limit_req zone=api_limit burst=500 nodelay;

        limit_conn conn_limit 100;

        #================================================
        # HEALTH CHECK
        #================================================

        location /health {

            access_log off;

            return 200 "healthy\n";
        }

        #================================================
        # AUTH SERVICE
        #================================================

        location /api/auth/ {

            proxy_pass http://auth_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;

            proxy_send_timeout 10s;

            proxy_read_timeout 10s;

            proxy_buffering on;

            proxy_buffers 32 32k;

            proxy_busy_buffers_size 64k;
        }

        #================================================
        # TRADING ENGINE
        #================================================

        location /api/trading/ {

            proxy_pass http://trading_service;

            proxy_http_version 1.1;

            proxy_set_header Connection "";

            proxy_set_header Host $host;

            proxy_connect_timeout 1s;

            proxy_send_timeout 3s;

            proxy_read_timeout 3s;

            proxy_buffering off;

            # low latency optimization
            tcp_nodelay on;
        }

        #================================================
        # PORTFOLIO SERVICE
        #================================================

        location /api/portfolio/ {

            proxy_pass http://portfolio_service;

            proxy_cache STATIC_CACHE;

            proxy_cache_valid 200 30s;

            proxy_cache_use_stale
            error timeout updating
            http_500 http_502 http_503 http_504;

            add_header X-Cache-Status $upstream_cache_status;
        }

        #================================================
        # STATIC FRONTEND
        #================================================

        location / {

            root /usr/share/nginx/html;

            index index.html;

            try_files $uri $uri/ /index.html;
        }

        #================================================
        # STATIC ASSET CACHING
        #================================================

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {

            expires 30d;

            add_header Cache-Control "public, immutable";

            access_log off;
        }

        #================================================
        # WEBSOCKET SUPPORT
        #================================================

        location /ws/ {

            proxy_pass http://trading_service;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;

            proxy_send_timeout 3600s;
        }
    }
}