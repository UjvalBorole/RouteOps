# Nginx Configuration Template for Large-Scale NSE Project
# This template is designed for deploying a high-traffic application with 40-50 microservices,
# 90-95 servers, handling 10M+ requests and 10M+ users across India.
# It emphasizes scalability, reliability, and performance.
# Placeholders like {{variable}} should be replaced with actual values.

# Worker processes: Set to auto for automatic scaling based on CPU cores.
worker_processes auto;

# Events block: Optimize for high concurrency.
events {
    # Use epoll on Linux for efficient event handling.
    use epoll;
    # Worker connections: High value for handling many simultaneous connections.
    worker_connections 10240;
    # Multi-accept: Accept multiple connections per event loop iteration.
    multi_accept on;
}

# HTTP block: Main configuration for HTTP traffic.
http {
    # Include MIME types for proper content serving.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging: Custom log format for detailed analytics.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ua="$upstream_addr" us="$upstream_status" '
                    'ut="$upstream_response_time" ul="$upstream_response_length" '
                    'cs=$upstream_cache_status';

    # Access and error logs: Use buffered logging for performance.
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # Sendfile: Enable for efficient file serving.
    sendfile on;
    # TCP nodelay: Disable Nagle's algorithm for low-latency.
    tcp_nodelay on;
    # TCP nopush: Optimize packet sending.
    tcp_nopush on;

    # Keepalive: Long timeout for persistent connections.
    keepalive_timeout 65;
    # Keepalive requests: High number to reuse connections.
    keepalive_requests 1000;

    # Client settings: Large buffers for high-throughput.
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Gzip compression: Enable for bandwidth savings.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Brotli compression: If supported, for better compression.
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Upstream blocks: Define load-balanced backends for microservices.
    # Assuming microservices are grouped or individually defined.
    # For 40-50 microservices, use dynamic upstreams or include separate files.
    # Example for a few; replicate for all.

    upstream auth_service {
        # Load balancing method: Least connections for even distribution.
        least_conn;
        # Server list: Replace with actual IPs/hosts and ports.
        server {{auth_service_1}}:{{port}} weight=1 max_fails=3 fail_timeout=30s;
        server {{auth_service_2}}:{{port}} weight=1 max_fails=3 fail_timeout=30s;
        # Add more servers as needed.
        # Health check: Use nginx-plus or lua for active checks.
        # check interval=3000 rise=2 fall=5 timeout=1000 type=http;
        # check_http_send "HEAD /health HTTP/1.0\r\n\r\n";
        # check_http_expect_alive http_2xx http_3xx;
    }

    upstream user_service {
        least_conn;
        server {{user_service_1}}:{{port}} weight=1 max_fails=3 fail_timeout=30s;
        server {{user_service_2}}:{{port}} weight=1 max_fails=3 fail_timeout=30s;
        # Repeat for all microservices.
    }

    # Add upstreams for other services: payment_service, notification_service, etc.
    # For scalability, consider using DNS-based discovery or consul for dynamic upstreams.

    # Rate limiting: Protect against abuse.
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    # Caching: Proxy cache for static and dynamic content.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=10g inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 302 10m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;

    # SSL/TLS: Secure configuration.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers: Add in server blocks.
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Server block: Main server for handling requests.
    server {
        listen 80;
        server_name {{domain_name}};
        # Redirect to HTTPS.
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name {{domain_name}};

        # SSL certificates: Replace with actual paths.
        ssl_certificate /etc/ssl/certs/{{cert_file}}.pem;
        ssl_certificate_key /etc/ssl/private/{{key_file}}.key;

        # Root and index: For static files if any.
        root /var/www/html;
        index index.html index.htm;

        # Rate limiting application.
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit_per_ip 10;

        # Locations: Route to microservices.
        location /api/auth/ {
            # Proxy to auth_service upstream.
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            # Caching for API responses if applicable.
            proxy_cache my_cache;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/user/ {
            proxy_pass http://user_service;
            # Similar proxy settings as above.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_cache my_cache;
            proxy_cache_bypass $http_upgrade;
        }

        # Add locations for other microservices: /api/payment/, /api/notification/, etc.
        # For 40-50 services, consider using regex or dynamic routing.

        location /static/ {
            # Serve static files with caching.
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            limit_req zone=static burst=200 nodelay;
        }

        location /health {
            # Health check endpoint.
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Default location: Fallback.
        location / {
            try_files $uri $uri/ =404;
        }

        # Error pages: Custom error handling.
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
        }
    }

    # Additional server blocks for other domains or subdomains if needed.
    # For example, for admin panel or API gateway.

    # Include additional configs if needed.
    # include /etc/nginx/conf.d/*.conf;
}

