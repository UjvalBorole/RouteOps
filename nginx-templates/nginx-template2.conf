# ╔═══════════════════════════════════════════════════════════════════════════════════════╗
# ║                    ENTERPRISE NGINX CONFIGURATION GUIDE                                ║
# ║            Production-Ready for 50+ Microservices & 10M+ Concurrent Users             ║
# ║                        PAN India Deployment Architecture                               ║
# ╚═══════════════════════════════════════════════════════════════════════════════════════╝
# 
# AUTHOR: Senior Nginx Architect (20+ Years Industry Experience)
# USE CASE: 40-50 Microservices | 90-95 Servers/Pods | 10M+ Daily Users
# DEPLOYMENT REGIONS: Mumbai, Delhi, Bengaluru, Chennai, Kolkata, Hyderabad
# LAST UPDATED: 2026
#
# KEY FEATURES:
#   - Multi-tier caching strategy (RAM, SSD, HDD)
#   - Rate limiting zones for DDoS prevention
#   - Advanced SSL/TLS configuration with HSTS
#   - Geographic routing for PAN India deployment
#   - WebSocket support for real-time features
#   - Kubernetes DNS service discovery
#   - gRPC load balancing for microservices
#   - Structured JSON logging for ELK/Splunk integration
#   - Circuit breaker pattern implementation
#   - Health check monitoring for all backends
#
# ═══════════════════════════════════════════════════════════════════════════════════════
# SECTION 1: MAIN CONTEXT - GLOBAL NGINX PROCESS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════════════
# This section defines how Nginx processes will run at the OS level.
# These settings affect ALL requests globally and apply before any HTTP traffic is processed.
#

# 📌 USER CONTEXT
# Run nginx worker processes as 'nginx' user (unprivileged account) for security hardening.
# This prevents any nginx compromise from accessing files owned by root.
# Default: nobody (in some distros) | Our choice: nginx (more standard)
# Security Impact: High - prevents privilege escalation attacks
user nginx;

# 📌 WORKER PROCESS CONFIGURATION
# Auto-detect the number of CPU cores and spawn one worker per core.
# Formula: Available_CPU_cores = 1 worker process each (optimal for single-socket systems)
# For multi-socket systems: Each NUMA node can have its own worker
# This enables true parallelism without over-subscription
# Example on 32-core system: 32 worker processes will be created
# Performance: This is the BEST setting for modern multi-core servers
worker_processes auto;

# 📌 CPU CORE BINDING (NUMA Awareness)
# Bind each worker process to specific CPU cores to prevent context switching
# "auto" = Nginx automatically maps workers to consecutive CPU cores
# Benefits: 
#   - Reduces cache invalidation from context switching
#   - Better L3 cache utilization
#   - Reduced memory latency on NUMA systems
#   - Improves performance by 5-15% on large systems
# Recommended for: 16+ core systems, especially with NUMA architecture
worker_cpu_affinity auto;

# 📌 WORKER PROCESS PRIORITY
# Lower nice value = higher priority in Linux scheduler
# -5 means "run 5 priority levels higher than default"
# Range in Linux: -20 (highest priority) to +19 (lowest priority)
# Value -5: Nginx gets more CPU time than standard processes
# Why: Ensures low-latency request handling during high load
# Side effect: May slightly reduce performance of other applications
# Best Practice: Use for production where Nginx is the primary service
worker_priority -5;

# 📌 FILE DESCRIPTOR LIMITS
# Maximum number of file descriptors (open files/connections) per worker
# 65535 = Each worker can handle 65,535 simultaneous open files/connections
# Calculation: Max Connections = (worker_processes × worker_rlimit_nofile) / 2
# Example: 32 workers × 65535 / 2 = ~1 million total connections possible
# System Default: Usually 1024 (too low for high-load services)
# Required Setting: Must be >= worker_connections value
# Security: Prevents resource exhaustion attacks
worker_rlimit_nofile 65535;

# 📌 CORE DUMP LIMIT
# Maximum size of core dump file when a worker crashes unexpectedly
# 2G = Allow up to 2GB core dump for post-mortem debugging
# Used for: Analyzing segmentation faults or critical failures
# Warning: Can consume significant disk space, monitor regularly
# Best Practice: Enable only in development/staging; disable in production if disk space is limited
worker_rlimit_core 2G;

# 📌 WORKING DIRECTORY CONFIGURATION
# Set working directory for core dumps and temporary data
# This path must be writable by the nginx user
# Ensure sufficient disk space (at least 5GB for core dumps)
# Monitor /var/cache/nginx and /var/log/nginx for disk usage
working_directory /var/cache/nginx;

# Additional log directory for working files
# Used by various Nginx modules for temporary operations
working_directory /var/log/nginx;

# 📌 DYNAMIC MODULE LOADING
# Load compiled Nginx modules for extended functionality beyond core features
# Modules must be compiled for your Nginx version
# Each module adds specific capabilities (compression, GeoIP, headers manipulation, etc.)

# Brotli compression module - Modern compression better than gzip
# Installation: apt-get install nginx-module-brotli (or build from source)
# Why: Brotli compresses 10-20% better than gzip while using similar CPU
# Trade-off: Slightly higher CPU usage vs. bandwidth savings
load_module modules/ngx_http_brotli_filter_module.so;

# Brotli static module - Serve pre-compressed .br files directly
# Allows: Storing assets as .js.br, .css.br for instant delivery
# Performance: Zero CPU overhead for compression, just static file serving
load_module modules/ngx_http_brotli_static_module.so;

# GeoIP2 module - MaxMind GeoIP database integration
# Function: Identify client country/city based on IP address
# Use cases: Geographic routing, region-specific content, compliance (GDPR)
# Database: MaxMind GeoLite2 (free tier) or GeoIP2 (paid, more accurate)
load_module modules/ngx_http_geoip2_module.so;

# Stream GeoIP2 module - GeoIP for TCP/UDP streams (non-HTTP)
# Function: Same as above but for stream block (gRPC, MySQL, Redis, etc.)
# Enables: Geographic routing for non-HTTP services
load_module modules/ngx_stream_geoip2_module.so;

# Virtual Host Traffic Status module - Real-time metrics dashboard
# Function: Provides /status endpoint with metrics in JSON/HTML format
# Metrics: Request count, bandwidth, response codes, upstream stats
# Integration: Compatible with Prometheus for monitoring systems
load_module modules/ngx_http_vhost_traffic_status_module.so;

# Headers More module - Advanced HTTP header manipulation
# Function: Add/remove/modify any HTTP header (request or response)
# Advanced Feature: Conditional header manipulation based on variables
# Example: Remove "Server" header for security, add custom headers
load_module modules/ngx_http_headers_more_filter_module.so;

# 📌 ERROR LOGGING CONFIGURATION
# Set global error log file and verbosity level
# Path: /var/log/nginx/error.log - Central location for all error messages
# Log Level: warn (only warnings, errors, critical messages)
# Available Levels (increasing verbosity): emerg, alert, crit, error, warn, notice, info, debug
# Caution: "debug" level creates massive log files; only use during troubleshooting
# Recommendation: Use "warn" in production (minimal overhead)
# Monitoring: Set up log rotation with logrotate to prevent disk filling
error_log /var/log/nginx/error.log warn;

# 📌 PROCESS ID (PID) FILE LOCATION
# Path: /var/run/nginx.pid - Contains the master process ID
# Function: Used by systemctl and init scripts to manage Nginx
# When reloading: PID stays same for master, old worker processes spawn new ones
# Hot Reload: systemctl reload nginx (graceful restart without dropping connections)
pid /var/run/nginx.pid;

# ═══════════════════════════════════════════════════════════════════════════════════════
# SECTION 2: EVENTS BLOCK - CONNECTION PROCESSING ENGINE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════════════
# The events block controls how Nginx handles client connections at the kernel level.
# This is where the magic happens for handling thousands/millions of concurrent connections.
# Optimal configuration here is critical for high-performance systems.
#

events {
    # 📌 I/O MULTIPLEXING METHOD
    # Use epoll (Linux) for ultra-efficient connection handling
    # epoll = "edge-triggered polling" - kernel tells Nginx exactly which connections need attention
    # Efficiency: O(1) time complexity (constant time regardless of connection count)
    # Alternatives (OS-dependent):
    #   - epoll: Linux (Best choice)
    #   - kqueue: BSD/macOS
    #   - select: Old method, O(n) complexity, max 1024 connections
    #   - poll: Older method, still O(n)
    # Performance Impact: epoll is 100x faster than select for 1000+ connections
    # History: Introduced in Linux 2.5.44 (2002), revolutionized async I/O
    use epoll;
    
    # 📌 MAXIMUM CONNECTIONS PER WORKER PROCESS
    # Each Nginx worker can handle 20,480 simultaneous connections
    # This is the single most important setting for high-concurrency scenarios
    # Formula for calculation: 
    #   Total Connections = worker_processes × worker_connections
    #   RAM Usage ≈ (Total Connections × 256 bytes/connection) + Buffer Overhead
    # Example: 32 worker_processes × 20480 = 655,360 max simultaneous connections
    # System Limits:
    #   - Linux ulimit: Check with: ulimit -n
    #   - File descriptor limit must be >= worker_rlimit_nofile
    #   - Memory: Each connection uses ~256-512 bytes in passive state
    # Tuning Guidelines:
    #   - Start: 1024 (default)
    #   - Light load: 4096
    #   - Medium load: 10240 (balanced setting)
    #   - Heavy load: 20480 (only if RAM allows)
    #   - Massive scale: 65535 (requires high system RAM: 128GB+)
    # WARNING: Setting too high without increasing system limits will cause connection refusal errors
    worker_connections 20480;
    
    # 📌 ACCEPT MULTIPLE CONNECTIONS PER CYCLE
    # Enable: Accept up to 32 new connections in single kernel event loop iteration
    # How: Instead of processing 1 connection per event, process up to 32
    # Benefit: Reduces context switches and improves throughput during connection spikes
    # Trade-off: Very minimal CPU overhead, massive throughput improvement
    # When to disable: Never, unless CPU is extremely limited (embedded systems)
    # Real-world impact: Can handle 30% more concurrent connections with same latency
    # Typical value: Leave at "on" for all scenarios except extremely low-power devices
    multi_accept on;
    
    # 📌 ACCEPT MUTEX LOCK
    # Enable: Mutex lock to prevent thundering herd problem during connection acceptance
    # Thundering Herd: All 32 worker processes wake up simultaneously for each new connection
    # Solution: Mutex ensures only one worker wakes up per connection (orchestrated)
    # Trade-off: Slight latency increase vs. CPU efficiency
    # When to disable: Custom high-performance tuning (advanced scenario)
    # Best Practice: Always keep on for standard setups
    # Performance: Negligible overhead (microseconds) vs. CPU efficiency gains
    accept_mutex on;
    
    # 📌 ACCEPT MUTEX DELAY
    # When: Worker process fails to acquire mutex lock
    # Action: Wait 100ms before retrying (prevents tight spinning loop)
    # Alternative Delays:
    #   - 50ms: Lower latency, higher CPU usage (high-frequency trading scenarios)
    #   - 100ms: Balanced (recommended)
    #   - 500ms: Lower CPU usage, acceptable latency increase
    # Trade-off: Latency vs. CPU efficiency during high connection spikes
    # Use Case: Lower delay for latency-critical apps (< 50ms response time requirements)
    accept_mutex_delay 100ms;
    
    # 📌 ASYNCHRONOUS I/O REQUESTS
    # Allow: Each worker to submit up to 32 async I/O requests simultaneously
    # Used by: aio threads directive in HTTP block for file operations
    # Benefit: Non-blocking file reads while waiting for network I/O
    # Example: Reading static files from disk while serving other connections
    # Performance: Improves throughput by hiding disk latency under network latency
    # Value Selection:
    #   - 16: Conservative (low memory systems)
    #   - 32: Recommended (sweet spot for most systems)
    #   - 64: Aggressive (high-performance systems with fast storage)
    # Requirement: Must be compiled with --with-file-aio flag
    worker_aio_requests 32;
}

# ═══════════════════════════════════════════════════════════════════════════════════════
# SECTION 3: HTTP BLOCK - MAIN WEB SERVER CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════════════
# The http block encapsulates ALL HTTP-related configuration.
# This is where the actual request/response handling logic is defined.
# Multiple server blocks can exist within http block (virtual hosts).
#

http {
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.1: DNS RESOLVER CONFIGURATION (For Dynamic Service Discovery)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # Critical for Kubernetes deployments where service IPs change dynamically
    # Enables dynamic upstream changes without restarting Nginx
    
    # 📌 KUBERNETES DNS RESOLVER (Primary)
    # Endpoint: kube-dns.kube-system.svc.cluster.local. (Kubernetes internal DNS)
    # Function: Resolve service names to IP addresses in real-time
    # Usage: Allows upstream servers to use DNS names (auto-resolves to current IPs)
    # Why: Services in Kubernetes scale up/down, IPs change constantly
    # Valid TTL: 10 seconds (refresh every 10s for latest IP list)
    # Note: The trailing dot (.) is required for absolute FQDN
    # Alternative: Use 127.0.0.11:53 (Docker's internal DNS)
    # Requirement: Only works if resolve directive is set on upstream servers
    resolver kube-dns.kube-system.svc.cluster.local. valid=10s;
    
    # Timeout for DNS query responses
    # 5 seconds: Maximum wait time for DNS resolution
    # If DNS is slow/unavailable: Requests will timeout after 5s
    # Trade-off: Lower = faster failure detection, Higher = tolerates DNS latency
    resolver_timeout 5s;
    
    # 📌 BACKUP RESOLVERS (External DNS servers)
    # Fallback resolvers if primary Kubernetes DNS is unavailable
    # 8.8.8.8: Google Public DNS (primary)
    # 8.8.4.4: Google Public DNS (secondary)
    # 1.1.1.1: Cloudflare DNS (alternative)
    # Valid TTL: 300 seconds (5 minutes for external DNS)
    # Why longer TTL: External DNS changes less frequently, save bandwidth
    # IPv6: Disabled (ipv6=off) - Most production servers use IPv4
    # Use Case: Resolving external service names (cloud providers, third-party APIs)
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s ipv6=off;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.2: BASIC HTTP SETTINGS (Content Type & Character Handling)
    # ═══════════════════════════════════════════════════════════════════════════════════
    
    # 📌 MIME TYPES MAPPING FILE
    # Include: /etc/nginx/mime.types - Pre-defined file extension to content-type mappings
    # Function: Maps .js→application/javascript, .css→text/css, etc.
    # Why: Ensures browsers receive correct Content-Type header for each file
    # Content Example:
    #   text/html html htm;
    #   text/css css;
    #   application/javascript js;
    # System File: Check with: file /etc/nginx/mime.types
    include /etc/nginx/mime.types;
    
    # 📌 DEFAULT MIME TYPE
    # Fallback: If file extension not found in mime.types, serve as octet-stream
    # Result: Binary file, browser shows "Save As" dialog
    # Alternative Values:
    #   - text/plain: Treat unknown files as plain text (displays in browser)
    #   - application/octet-stream: Binary file (downloads/unknown handling)
    # Best Practice: Keep as octet-stream (most conservative)
    default_type application/octet-stream;
    
    # 📌 CHARACTER SET FOR HTTP RESPONSES
    # Add charset=utf-8 to Content-Type header for all text responses
    # Function: Tells browser: "This text is UTF-8 encoded"
    # Benefit: Prevents character encoding issues (mojibake)
    # Applied to: text/plain, text/html, text/css, application/json (if text-based)
    # Impact: Adds "charset=utf-8" to Content-Type header
    # Standard: UTF-8 is recommended encoding for modern web (universal compatibility)
    charset utf-8;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.3: SECURITY HARDENING (Hide Nginx Identity & Custom Headers)
    # ═══════════════════════════════════════════════════════════════════════════════════
    
    # 📌 DISABLE SERVER TOKEN HEADER
    # Removes: "Server: nginx/1.25.3" header from responses
    # Security: Prevents disclosure of Nginx version (attackers research known CVEs)
    # Trade-off: Minimal - security through obscurity is secondary benefit
    # IMPORTANT: This alone doesn't prevent attacks, but reduces reconnaissance
    # Best Practice: Always set to "off" in production
    # Check: curl -I https://example.com | grep Server
    server_tokens off;
    
    # 📌 CLEAR DEFAULT SERVER HEADER
    # Remove any pre-set Server header (from loaded modules)
    # Part of headers_more_filter_module (must be loaded above)
    # Function: Strips existing Server header completely
    more_clear_headers 'Server';
    
    # 📌 SET CUSTOM SERVER HEADER
    # Custom header: "Server: RouteOps-Gateway"
    # Benefit: Identifies your service without revealing Nginx version
    # Function: Replaces the cleared header with custom one
    # Examples:
    #   - "Server: MyApp/1.0" (branding)
    #   - "Server: API-Gateway" (functional identification)
    #   - Remove completely: more_clear_headers 'Server'; (no set)
    # Impact: Helps clients identify what service they're connecting to
    more_set_headers 'Server: RouteOps-Gateway';
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.4: PERFORMANCE TUNING (Network & Disk Optimization)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # These settings optimize how Nginx sends/receives data over network and disk
    
    # 📌 SENDFILE MODE (Zero-Copy File Transmission)
    # Enable: Use sendfile() system call for efficient file transmission
    # How: Copies file directly from disk to network socket kernel-to-kernel
    # Benefit: Eliminates user-space buffering, reduces memory usage
    # Performance Impact: 10-20x faster than read() + write() approach
    # CPU Usage: Reduced (zero memory copy operations)
    # Best For: Static file serving, large file downloads
    # Limitation: Doesn't work with SSL/TLS (falls back to normal copy)
    # System Requirement: Linux 2.4.0+ (standard on modern systems)
    sendfile on;
    
    # 📌 SENDFILE CHUNK SIZE
    # Maximum: 2MB per sendfile() call
    # Trade-off: Larger chunks = fewer system calls = lower overhead
    # Value tuning:
    #   - 512k: Conservative (higher CPU, lower memory)
    #   - 1m: Balanced (default recommendation)
    #   - 2m: Aggressive (lower CPU, higher memory usage)
    #   - 4m: Maximum (only for high-bandwidth links)
    # Bandwidth Example: 1Gbps connection optimal at 2MB chunks
    # Memory: Each worker allocates sendfile_max_chunk memory
    sendfile_max_chunk 2m;
    
    # 📌 DIRECT I/O FOR LARGE FILES
    # Enable: Direct I/O (bypass OS cache) for files > 4MB
    # Why: Large files bypass page cache, faster transmission
    # Alignment: 512 bytes (standard disk sector size)
    # Use Case: Video streaming, large file downloads
    # Trade-off: Bypasses caching, reduces memory pressure
    # Performance: Faster for 1-time file reads (no cache benefit)
    # Caution: Only use for files that won't be accessed frequently
    directio 4m;
    
    # 📌 DIRECT I/O ALIGNMENT
    # Alignment: 512 bytes (minimum disk sector size)
    # Required: File offset and size must be multiples of 512 bytes
    # Default: 512 (most common)
    # Others: 4096 (4K alignment for SSDs), 16 (old compatibility)
    # Why: Disk controllers optimize reads/writes on sector boundaries
    directio_alignment 512;
    
    # 📌 ASYNCHRONOUS FILE I/O
    # Enable: Use thread pool for non-blocking file I/O operations
    # Method: Offload file reads to thread pool (not worker process)
    # Benefit: Worker can handle other requests while waiting for disk
    # Requirement: Compiled with --with-file-aio option
    # Thread Pool: Default uses system worker thread pool
    # Performance: Hides disk latency under network latency
    aio threads;
    
    # 📌 TCP PACKET OPTIMIZATION - PUSH FLAG
    # Enable: Send HTTP headers in separate TCP packet (complete headers first)
    # Purpose: Ensures full header arrives before body data
    # TCP Mechanics: Prevents mixing headers with body data across packets
    # Performance: Slight latency increase, better packet efficiency
    # Use Case: Important for HTTP/1.0 clients
    # Default: on (recommended)
    # Trade-off: One extra packet for headers, cleaner protocol handling
    tcp_nopush on;
    
    # 📌 TCP PACKET OPTIMIZATION - NAGLE'S ALGORITHM DISABLE
    # Disable: Nagle's algorithm (waits for full packet before sending)
    # Purpose: Immediate transmission of small TCP segments (low latency)
    # Why Disable: Nginx response headers are typically < 1500 bytes
    # Effect: Headers sent immediately, reducing perceived latency
    # Impact: Small increase in packet count, but better user experience
    # Protocol: Critical for HTTP/1.1 persistent connections
    # Trade-off: Slightly more network overhead, significantly lower latency
    tcp_nodelay on;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.5: CONNECTION TIMEOUT CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════════════
    # Defines how long connections can remain idle before Nginx closes them
    
    # 📌 CLIENT REQUEST BODY TIMEOUT
    # Timeout: 30 seconds to receive complete request body
    # Scenario: POST request with large payload taking time
    # Action: If complete body not received after 30s, close connection
    # Security: Prevents slowloris attacks (slowly sending data)
    # Too Low: Might cut off slow upload connections
    # Too High: Wastes resources on stalled connections
    # Recommended: 30s (for 1Gbps: ~3.75GB per 30s)
    client_body_timeout 30s;
    
    # 📌 CLIENT REQUEST HEADER TIMEOUT
    # Timeout: 30 seconds to receive complete request headers
    # Scenario: Slow client sending headers
    # Action: If headers not complete after 30s, send 408 Request Timeout
    # Security: Prevents slowloris attacks on headers
    # Typical: Headers received in < 100ms (30s is very generous)
    # Recommended: 30s (covers very slow connections)
    client_header_timeout 30s;
    
    # 📌 SEND RESPONSE TIMEOUT
    # Timeout: 30 seconds to send response to client
    # Scenario: Client reading very slowly (large response body)
    # Action: After 30s with no data sent, close connection
    # Security: Prevents slowloris attack where client reads slowly
    # Trade-off: High timeout needed for slow clients (rural India)
    # Recommended: 30-60s (network dependent)
    send_timeout 30s;
    
    # 📌 KEEPALIVE CONNECTION TIMEOUT
    # Timeout: 65 seconds for idle persistent connections
    # Purpose: How long to keep HTTP/1.1 persistent connections alive
    # Benefit: Reuse same TCP connection for multiple HTTP requests
    # Typical: Browser makes 5-10 requests per connection (CSS, JS, images)
    # Effect: Reduces connection overhead, improves page load time
    # Trade-off: Ties up worker/memory resources
    # Adjustment for slow clients: Increase to 120s
    keepalive_timeout 65s;
    
    # 📌 KEEPALIVE REQUESTS PER CONNECTION
    # Maximum: 1000 HTTP requests per single TCP connection
    # Before: Old default was 100, too low for modern SPAs
    # Benefit: Thousands of assets served on same connection
    # Example: Single persistent connection serves 50 CSS/JS/Image files
    # Trade-off: Very high values (10000+) can cause memory bloat
    # Recommended: 1000 (excellent for modern apps)
    keepalive_requests 1000;
    
    # 📌 KEEPALIVE DISABLE FOR OLD BROWSERS
    # Disable: Persistent connections for MSIE6 (Internet Explorer 6)
    # Why: MSIE6 had keepalive bugs causing issues
    # Impact: IE6 users get non-persistent connections (slower)
    # Practical: IE6 is obsolete (end of support: 2016), safe to ignore
    # Alternative: Remove "msie6" to force keepalive for all browsers
    keepalive_disable msie6;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.6: REQUEST LIMITS (DDoS Prevention & Abuse Mitigation)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # These settings protect against:
    #   - Volumetric DDoS attacks (flood with huge requests)
    #   - Slowloris attacks (slow client connections)
    #   - Brute force attacks (automated login attempts)
    #   - Resource exhaustion (memory/connections)
    
    # 📌 CLIENT REQUEST BODY SIZE LIMIT
    # Maximum: 50MB per request body (POST data, file uploads)
    # Too Low: Legitimate file uploads fail with 413 Payload Too Large
    # Too High: Wastes memory on malicious huge payloads
    # Common Values:
    #   - 1M: REST APIs (typical)
    #   - 10M: Image uploads
    #   - 50M: Video uploads, document processing
    #   - 100M+: File server (requires caution)
    # Default: 1MB (if not set)
    # Tuning: Set to max legitimate request size + 10% buffer
    client_max_body_size 50M;
    
    # 📌 CLIENT REQUEST BODY BUFFER SIZE
    # Buffer: 128KB for buffering POST data before processing
    # Purpose: Temp storage while receiving client data
    # Trade-off: Higher = less disk I/O, but uses RAM
    # Typical: 128KB (standard for API requests)
    # For large uploads: Can use /dev/shm (RAM disk) for faster I/O
    client_body_buffer_size 128k;
    
    # 📌 CLIENT REQUEST HEADER BUFFER SIZE
    # Buffer: 4KB for receiving request headers
    # Typical: Headers are < 2KB for normal requests
    # Large Headers: Cookies, Authorization headers, custom headers
    # Value: 4KB covers 95% of real-world requests
    # HTTP Spec: Headers can be unlimited (theoretically)
    client_header_buffer_size 4k;
    
    # 📌 LARGE CLIENT HEADER BUFFERS
    # Emergency buffers: 4 buffers of 32KB each (128KB total)
    # When needed: Request has extremely large headers (many cookies, long tokens)
    # Behavior:
    #   1. Try to fit in client_header_buffer_size (4K)
    #   2. If fails, use large_client_header_buffers
    #   3. If still fails, return 400 Bad Request
    # Tuning:
    #   - 4 64k: For extreme cases (many cookies/headers)
    #   - 4 32k: Balanced (default recommendation)
    #   - 8 16k: More buffers, each smaller
    # Performance: Trade-off between flexibility and memory usage
    large_client_header_buffers 4 32k;
    
    # 📌 RATE LIMITING ZONE 1 - GLOBAL IP LIMIT
    # Zone: global_limit - Limit all requests per IP address
    # Size: 100MB shared memory (tracks ~6.4M unique IPs)
    # Rate: 100 requests per second per IP
    # Scope: All types of requests, all endpoints
    # Use Case: Prevent simple volumetric DDoS
    # Calculation: 100 req/s × 3600s = 360,000 req/hour per IP
    # Bypass: Legitimate services (CDN, proxies) may need whitelisting
    limit_req_zone $binary_remote_addr zone=global_limit:100m rate=100r/s;
    
    # 📌 RATE LIMITING ZONE 2 - LOGIN ENDPOINT LIMIT
    # Zone: login_limit - Limit login/authentication attempts
    # Size: 10MB shared memory
    # Rate: 10 requests per minute per IP
    # Purpose: Prevent brute force password guessing
    # Calculation: 10 req/min = 14,400 attempts/day per IP
    # False Positives: Users who mistype password 10+ times get blocked 1 minute
    # Note: Can track failed attempts separately for better UX
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    
    # 📌 RATE LIMITING ZONE 3 - API ENDPOINT LIMIT
    # Zone: api_limit - Limit general API requests
    # Size: 50MB shared memory
    # Rate: 500 requests per second per IP
    # Purpose: Protect backend services from overload
    # Calculation: 500 req/s × 3600s = 1.8M requests/hour per IP
    # Generous: High limit (most legitimate apps use < 100 req/s)
    # Adjustment: Lower for rate-sensitive endpoints (search, ML models)
    limit_req_zone $binary_remote_addr zone=api_limit:50m rate=500r/s;
    
    # 📌 RATE LIMITING ZONE 4 - USER ID BASED LIMIT
    # Zone: user_limit - Limit requests per authenticated user
    # Size: 200MB shared memory (tracks ~12M unique user IDs)
    # Rate: 50 requests per second per user ID
    # Purpose: Fair usage for authenticated users (logged-in)
    # Benefit: Same IP different users get separate limits (fair)
    # Source: X-User-ID header (must be set by app)
    # Use Case: SaaS/subscription-based services (prevent abuse)
    limit_req_zone $http_x_user_id zone=user_limit:200m rate=50r/s;
    
    # 📌 CONNECTION LIMIT - BY CLIENT IP
    # Zone: conn_per_ip - Limit simultaneous connections per IP
    # Size: 50MB shared memory
    # Purpose: Prevent connection exhaustion attacks
    # Benefit: Each IP can use max connections (HTTP/1.1 multiplexing)
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:50m;
    
    # 📌 CONNECTION LIMIT - BY SERVER NAME
    # Zone: conn_per_vhost - Limit total connections per domain
    # Size: 100MB shared memory
    # Purpose: Ensure specific domain doesn't consume all resources
    # Benefit: Isolates impact of attacks on single domain
    # Use Case: Multi-tenant systems (domains don't affect each other)
    limit_conn_zone $server_name zone=conn_per_vhost:100m;
    
    # 📌 BANDWIDTH LIMIT - AFTER INITIAL DATA
    # Trigger: After client receives 10MB of data
    # Purpose: Prevent streaming abuse (slow drain attacks)
    # Limit Rate: 1MB per second after initial threshold
    # Use Case: Video downloads, file downloads (prevent single connection hogging)
    # Trade-off: Protects server from connection starvation
    limit_rate_after 10m;
    limit_rate 1m;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.7: CACHING CONFIGURATION (Multi-Tier Strategy for 10M+ Users)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # Three-layer caching strategy balances speed, memory, and disk space
    # Layer 1: In-Memory (Fastest) → Layer 2: SSD (Medium) → Layer 3: HDD (Fallback)
    # Concept: Like CPU caches (L1, L2, L3) but for HTTP responses
    
    # 📌 LAYER 1 CACHE - IN-MEMORY (FASTEST - /dev/shm)
    # Path: /dev/shm/nginx_cache - RAM disk (tmpfs)
    # Size: 4GB maximum total cache size (volatile - lost on reboot)
    # Key Structure: levels=1:2 means 1-char first level, 2-char second level
    # Example: key "abc123def" stored as: /a/bc/123def
    # Keys Zone: mem_cache:512m - 512MB for tracking cache keys
    # Ratio: 512MB keys zone = ~4GB cache capacity (assumes 1KB average response)
    # Inactive: 60 minutes - Remove items not accessed for 60 minutes
    # Use Temp Path: off - Don't use separate temp directory
    # Performance: < 1ms response time (RAM access)
    # Use Case: Small, frequently accessed data (API responses, JSON)
    # Caution: RAM is lost on reboot, use for non-critical data only
    # Example Contents: API responses (< 100KB), JSON data, frequently accessed pages
    proxy_cache_path /dev/shm/nginx_cache levels=1:2 keys_zone=mem_cache:512m \
                     max_size=4g inactive=60m use_temp_path=off;
    
    # 📌 LAYER 2 CACHE - SSD (MEDIUM SPEED - /var/cache/nginx/ssd_cache)
    # Path: /var/cache/nginx/ssd_cache - SSD storage (persistent)
    # Size: 50GB maximum total cache size (survives reboot)
    # Key Structure: levels=2:2 means 2-char first level, 2-char second level
    # Example: key "abc123def" stored as: /ab/c1/23def (better distribution)
    # Keys Zone: ssd_cache:4g - 4GB for tracking cache keys
    # Ratio: 4GB keys zone = ~50GB cache capacity
    # Inactive: 24 hours - Keep for 1 day (longer than mem_cache)
    # Use Temp Path: off - Direct write to cache directory
    # Manager: Controls cache cleanup in background
    #   - Files: Clean up 100 files per iteration
    #   - Threshold: Start cleanup if 50ms threshold met
    #   - Sleep: Wait 50ms between cleanup iterations
    # Performance: 1-5ms response time (SSD access)
    # Use Case: Medium-sized assets (images, CSS, JS, small videos)
    # Contents: Static assets, processed API responses, CDN-like content
    proxy_cache_path /var/cache/nginx/ssd_cache levels=2:2 keys_zone=ssd_cache:4g \
                     max_size=50g inactive=24h use_temp_path=off manager_files=100 \
                     manager_threshold=50ms manager_sleep=50ms;
    
    # 📌 LAYER 3 CACHE - HDD (SLOW - /var/cache/nginx/hdd_cache)
    # Path: /var/cache/nginx/hdd_cache - Traditional HDD storage (persistent)
    # Size: 200GB maximum total cache size (huge capacity, slower access)
    # Key Structure: levels=2:2:2 means 2-char, 2-char, 2-char levels
    # Example: Better distribution for large cache (200GB+)
    # Keys Zone: hdd_cache:2g - 2GB for tracking cache keys (less RAM)
    # Ratio: 2GB keys zone = ~200GB cache capacity
    # Inactive: 168 hours - Keep for 1 week (long-term storage)
    # Use Temp Path: on - Write to temp directory first, then move
    # Loader: Asynchronous background cache loader
    #   - Files: Load 1000 files per iteration
    #   - Sleep: Wait 50ms between iterations
    #   - Threshold: Start if 300ms threshold met
    # Performance: 10-50ms response time (HDD access - slowest)
    # Use Case: Large, infrequently accessed assets (archives, logs, backups)
    # Trade-off: Massive capacity but slow (use only for cold data)
    # Example: Monthly reports, historical data, backup files
    proxy_cache_path /var/cache/nginx/hdd_cache levels=2:2:2 keys_zone=hdd_cache:2g \
                     max_size=200g inactive=168h use_temp_path=on \
                     loader_files=1000 loader_sleep=50ms loader_threshold=300ms;
    
    # 📌 FASTCGI CACHE (For PHP/Python backend responses)
    # Purpose: Cache responses from FastCGI backends (PHP-FPM, Python WSGI)
    # Path: /var/cache/nginx/fastcgi - Dedicated cache for backend responses
    # Size: 10GB maximum (typical for moderate PHP apps)
    # Use Case: Cache HTML/JSON generated by PHP/Python backends
    # Example: Cache rendered HTML pages instead of re-running PHP
    # Performance: Huge speedup for database-heavy applications
    # Requirement: Use fastcgi_cache directives in location blocks
    fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=fastcgi_cache:512m \
                       max_size=10g inactive=60m;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.8: COMPRESSION CONFIGURATION (Bandwidth Optimization - Save 70-80%)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # Compression reduces response size for faster transmission
    # Trade-off: CPU usage (compression) vs. bandwidth (transmission time)
    # Modern advice: Compression almost always wins (CPU is cheap, bandwidth is expensive)
    
    # 📌 GZIP COMPRESSION (Standard, Universally Supported)
    # Enable: On-the-fly gzip compression for responses
    # Support: Supported by all modern browsers (>99% coverage)
    # Standard: Gzip is industry standard since 1992 (very mature)
    # Compression Ratio: 60-80% for text (typical: CSS 80%, JS 65%, HTML 45%)
    # History: Used by HTTP/1.1 for decades
    gzip on;
    
    # 📌 GZIP VARY HEADER
    # Enable: Add "Vary: Accept-Encoding" header to compressed responses
    # Purpose: Tell caches "this content varies based on Accept-Encoding"
    # Why: Prevent sending gzip response to non-gzip-capable client
    # Browser Caching: Important for proxy caches and browser cache
    # Effect: Separate cache entries for gzip vs. non-gzip versions
    gzip_vary on;
    
    # 📌 GZIP FOR PROXIED RESPONSES
    # Enable: Also gzip responses from upstream services (proxied)
    # Default: Only gzip Nginx-generated responses
    # Use "any": Gzip all responses regardless of source
    # Benefit: Compress backend responses before sending to client
    # Performance: Huge savings for backend API responses (JSON)
    gzip_proxied any;
    
    # 📌 GZIP COMPRESSION LEVEL
    # Level: 6 (on scale 1-9, where 9 is maximum compression)
    # Trade-off: Higher level = smaller size but more CPU
    # Level 1: 10% compression, 1% CPU overhead
    # Level 6: 75% compression, 5% CPU overhead (recommended)
    # Level 9: 78% compression, 20% CPU overhead (rarely worth it)
    # Selection: 6 is optimal for web services (good compromise)
    # Adjustment: Lower to 5 if CPU-constrained, higher to 7 for bandwidth-critical
    gzip_comp_level 6;
    
    # 📌 GZIP MINIMUM LENGTH TO COMPRESS
    # Minimum: 1024 bytes (1KB) minimum response size to compress
    # Why: Compression overhead (headers, algorithm) only worth it for larger files
    # Below 1KB: Compression overhead makes response larger
    # Tiny Responses: JSON API responses (< 500 bytes) should not be compressed
    # Trade-off: Smaller threshold = more CPU for minimal savings
    # Recommended: 1024 (default best practice)
    gzip_min_length 1024;
    
    # 📌 GZIP DISABLE FOR OLD BROWSERS
    # Disable: Gzip for MSIE6 (Internet Explorer 6)
    # Why: IE6 had bugs with gzip decompression
    # Reality: IE6 is obsolete (discontinued 2016)
    # Practical: Safe to keep (very few users), doesn't affect modern browsers
    # Alternative: Update to "msie[1-6]" to disable for all old IE versions
    gzip_disable "msie6";
    
    # 📌 GZIP CONTENT TYPES TO COMPRESS
    # List of MIME types that should be gzipped
    # Text/Code types: Most compressible (70-85% reduction)
    # Binary types: Already compressed (images), skip gzip
    # Examples:
    #   - text/plain: Excellent (90% reduction)
    #   - text/css: Excellent (85% reduction)
    #   - application/javascript: Good (70% reduction)
    #   - application/json: Good (60-75% reduction)
    #   - image/svg+xml: Good (60% reduction, vector format)
    #   - image/png: Poor (1-5%, already compressed, skip!)
    #   - image/jpeg: Poor (0-2%, already compressed, skip!)
    # Strategy: Include text/code, exclude binary image formats
    gzip_types
        text/plain                              # Plain text files
        text/css                                # Stylesheets
        text/xml                                # XML documents
        text/js                                 # Legacy JavaScript type
        text/x-js                               # Alternative JS type
        text/javascript                         # JavaScript files
        application/json                        # JSON API responses
        application/javascript                  # JavaScript (proper type)
        application/x-javascript                # Legacy JS type
        application/xml                         # XML documents
        application/xml+rss                     # RSS/Atom feeds
        application/rss+xml                     # RSS feeds
        application/atom+xml                    # Atom feeds
        application/ld+json                     # JSON-LD linked data
        application/manifest+json               # Web manifest
        application/x-web-app-manifest+json     # Legacy web manifest
        image/svg+xml                           # SVG vector images (excellent compression)
        font/ttf                                # TrueType fonts
        font/otf                                # OpenType fonts
        font/x-woff                             # WOFF fonts (older)
        font/woff                               # WOFF fonts
        font/woff2;                             # WOFF2 fonts (modern)
    
    # 📌 BROTLI COMPRESSION (Modern Alternative, Better Than Gzip)
    # Enable: Modern compression algorithm better than gzip
    # Inventor: Google (2015), standardized in RFC 7932
    # Compression: 10-20% better than gzip on same CPU time
    # Browser Support: All modern browsers (except IE, old mobile)
    # Speed: Similar CPU cost to gzip, but smaller output
    # Requirement: Module must be loaded (see load_module above)
    # Recommendation: Use brotli when available, fallback to gzip
    brotli on;
    
    # 📌 BROTLI COMPRESSION LEVEL
    # Level: 6 (same scale as gzip, 1-11 max for brotli)
    # Difference: Brotli uses 1-11 scale (vs. gzip 1-9)
    # Level 6: Optimal balance between compression and CPU (5-10% overhead)
    # For Brotli: 11 is feasible (only 30% more CPU than level 6)
    # Recommendation: 6 for balanced performance, 10 for bandwidth-critical
    brotli_comp_level 6;
    
    # 📌 BROTLI STATIC COMPRESSION
    # Enable: Serve pre-compressed .br files instead of compressing on-the-fly
    # Use Case: Static assets pre-compressed during build (CSS, JS)
    # Benefit: Zero CPU overhead for brotli compression (server pre-compressed)
    # File Format: app.js.br (pre-compressed), served when client supports brotli
    # Build Tools: webpack, gulp, webpack-brotli-plugin support pre-compression
    # Performance: Instant serving of pre-compressed assets
    brotli_static on;
    
    # 📌 BROTLI CONTENT TYPES
    # Same list as gzip (text/code types only)
    # Redundancy: Same types work well with brotli
    # Browser Behavior: Sends Accept-Encoding header with preferred algorithms
    #   - Chrome: "Accept-Encoding: gzip, deflate, br"
    #   - Firefox: "Accept-Encoding: gzip, deflate, br"
    #   - Safari: "Accept-Encoding: gzip, deflate"
    # Nginx Logic: Uses Accept-Encoding header to pick best algorithm
    brotli_types text/plain text/css text/xml text/javascript application/json \
                 application/javascript application/xml application/rss+xml \
                 image/svg+xml;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.9: LOGGING CONFIGURATION (ELK/Splunk Integration)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # Structured logging enables analytics, monitoring, troubleshooting, compliance
    # JSON Format: Machine-readable logs for ELK Stack integration
    # Purpose: Every request logged with rich metadata for analysis
    
    # 📌 EXTENDED ACCESS LOG FORMAT (Human-Readable)
    # Purpose: Traditional log format with additional performance metrics
    # Fields: request time, upstream response time, connection details
    # Use Case: Manual log analysis, debugging, human-readable reports
    # Example: [10/May/2026:15:30:45] "GET /api/route" 200 1024 rt=0.025 ut=0.010
    # Format Variables:
    #   $remote_addr: Client IP address
    #   $remote_user: Authenticated user (basic auth)
    #   $time_local: Time in local timezone
    #   $request: HTTP method, URI, protocol (GET /api/route HTTP/1.1)
    #   $status: HTTP status code (200, 404, 500, etc.)
    #   $body_bytes_sent: Response body size (headers not included)
    #   $http_referer: Previous page (HTTP Referer header)
    #   $http_user_agent: Browser/client info
    #   $http_x_forwarded_for: Original client IP (from load balancer)
    #   $request_time: Total time to process request (seconds)
    #   $upstream_response_time: Backend processing time
    #   $pipe: Request pipeline status (p=pipelined)
    #   $connection_requests: Requests on this connection
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        '$request_time $upstream_response_time '
                        '$pipe $connection_requests '
                        '"$http_x_request_id" $host';
    
    # 📌 JSON LOG FORMAT (For ELK Stack)
    # Purpose: Machine-readable structured logs (not text parsing needed)
    # Tool: ELK Stack (Elasticsearch, Logstash, Kibana) ingests JSON
    # Benefit: Enables complex queries, dashboards, alerts on log data
    # Example: {"timestamp":"2026-05-10T15:30:45Z", "status":200, "request_time":0.025}
    # Parser: Logstash parses JSON automatically (no regex needed)
    # Escape: JSON-safe escaping (quotes, special chars handled)
    # Fields included:
    #   timestamp: ISO 8601 timestamp
    #   remote_addr: Client IP
    #   request_method: GET, POST, PUT, DELETE, etc.
    #   request_uri: Full URI path and query string
    #   request_length: Total request size (bytes)
    #   status: HTTP status code
    #   bytes_sent: Response body size
    #   request_time: Total processing time (seconds)
    #   upstream_response_time: Backend response time
    #   upstream_addr: Backend service IP
    #   upstream_status: Backend HTTP status code
    #   geoip_country: Client country (from GeoIP2)
    #   geoip_city: Client city
    #   geoip_region: Client region/state
    #   service_name: Microservice name (from header)
    #   trace_id: Distributed trace ID (for tracing)
    #   mobile: Mobile device indicator
    log_format json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"request_length":$request_length,'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"server_name":"$server_name",'
        '"request_id":"$http_x_request_id",'
        '"geoip_country":"$geoip2_country_code",'
        '"geoip_city":"$geoip2_city",'
        '"geoip_region":"$geoip2_region",'
        '"service_name":"$http_x_service_name",'
        '"trace_id":"$http_x_trace_id",'
        '"user_agent_device":"$http_sec_ch_ua",'
        '"mobile":"$http_sec_ch_ua_mobile"'
    '}';
    
    # 📌 MAIN ACCESS LOG (JSON Format)
    # Path: /var/log/nginx/access.log
    # Format: json (machine-readable for ELK)
    # Buffer: 32KB - Buffered writing (faster, reduces disk I/O)
    # Flush: Every 5 seconds (log entries appear in 5s delay)
    # Purpose: Comprehensive logging of all requests
    # Size: Typical 100-200 MB/day for moderate traffic
    # Rotation: Use logrotate to compress/archive daily
    # ELK Integration: Logstash reads and parses JSON automatically
    access_log /var/log/nginx/access.log json buffer=32k flush=5s;
    
    # 📌 EXTENDED ACCESS LOG (Human-Readable Format)
    # Path: /var/log/nginx/access_extended.log
    # Format: main_ext (human-readable with timing metrics)
    # Buffer: 64KB - Larger buffer for more efficient I/O
    # Flush: Every 10 seconds (less frequent writes)
    # Condition: Only log if $loggable = 1 (defined below)
    # Purpose: Additional metrics for analysis (separate from JSON)
    # Useful For: Debugging performance issues, timing analysis
    access_log /var/log/nginx/access_extended.log main_ext buffer=64k flush=10s if=$loggable;
    
    # 📌 OPEN FILE CACHE (Reduce Disk I/O)
    # Purpose: Cache file metadata (inode, permissions, size)
    # Max: 10,000 files cached in memory
    # Inactive: Remove cache entry if not accessed for 60s
    # Benefit: Avoid stat() system calls for frequently accessed files
    # Performance: Reduces disk I/O by 20-30% for static file serving
    # Valid: Re-validate cache entry every 30s
    # Min Uses: Require 2+ accesses before caching (avoid one-time files)
    # Errors: Cache negative results (file not found) to prevent repeated lookups
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # ═══════════════════════════════════════════════════════════════════════════════════
    # SUBSECTION 3.10: SECURITY HEADERS (OWASP Top 10 Protection)
    # ═══════════════════════════════════════════════════════════════════════════════════
    # HTTP security headers prevent common web attacks (XSS, clickjacking, etc.)
    # No API key needed: Just HTTP headers, free security improvement
    # Browser support: All modern browsers (IE11+)
    
    # 📌 SECURITY HEADER MAPPING (Conditional headers)
    # Purpose: Set security headers based on response status
    # Default: Apply headers to all responses (status 200, 400, 500, etc.)
    # Advanced: Could conditionally change based on response code
    map $status $security_headers {
        default "1";  # Apply headers to all responses
    }
    
    # 📌 X-FRAME-OPTIONS (Prevent Clickjacking Attacks)
    # Attack: Attacker loads target site in hidden iframe, tricks user into clicking
    # Defense: Browser won't embed page in iframe (except same origin)
    # Value: SAMEORIGIN = Only allow embedding on same domain
    # Alternative values:
    #   - DENY: Never allow embedding in any iframe
    #   - SAMEORIGIN: Only allow embedding on same domain
    #   - ALLOW-FROM url: (deprecated) allow specific domain
    # Browser Support: IE11+, all modern browsers
    # Impact: Huge security improvement for credential-based sites
    # Caution: May break legitimate use cases (e.g., embedded dashboards)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # 📌 X-CONTENT-TYPE-OPTIONS (Prevent MIME Type Sniffing)
    # Attack: Browser guesses MIME type (executes JS even if served as .txt)
    # Defense: Force browser to respect Content-Type header
    # Value: nosniff = Browser must follow Content-Type strictly
    # Effect: .js served as text/plain = displayed as text, not executed
    # Browser Support: All modern browsers
    # Impact: Prevents execution of mistyped content
    # Real-world: Mitigates uploaded file bypass attacks
    add_header X-Content-Type-Options "nosniff" always;
    
    # 📌 X-XSS-PROTECTION (Enable Browser XSS Filter)
    # Attack: Cross-Site Scripting (XSS) injection via user input
    # Defense: Enable browser's built-in XSS protection
    # Value: 1; mode=block
    #   - 1 = Enable XSS filter
    #   - mode=block = Block page (instead of sanitizing)
    # Modern browsers: Have more advanced XSS protection
    # Limitation: Not sufficient alone (need CSP)
    # Recommendation: Use alongside Content-Security-Policy
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 📌 REFERRER-POLICY (Control Referrer Information)
    # Info: HTTP Referer header sent when user clicks link
    # Privacy: Leaks information about user's previous page
    # Value: strict-origin-when-cross-origin
    #   - Same-site: Send full URL (needed for analytics)
    #   - Cross-site: Send only origin (domain only, no path)
    #   - HTTPS→HTTP: Don't send (never degrade security)
    # Benefits: Privacy, prevents sensitive URL leakage
    # Trade-offs: Analytics tools need adjustment
    # Example: Clicking /admin/user=123 to external site
    #   - Before: External site sees /admin/user=123
    #   - After: External site sees only domain name
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 📌 PERMISSIONS-POLICY (Disable Browser Features)
    # Purpose: Restrict which browser features scripts can access
    # geolocation=(self): Only same-origin scripts can access location
    # microphone=(): No scripts can access microphone (deny all)
    # camera=(): No scripts can access camera (deny all)
    # Benefits:
    #   - Prevent malicious ad scripts from accessing camera
    #   - Prevent accidental geolocation leaks
    #   - Protect user privacy
    # Browser Support: Partial (Feature-Policy is older name)
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    
    # 📌 CROSS-ORIGIN-EMBEDDER-POLICY (Protect Against Spectre)
    # Attack: Spectre/Meltdown can read cross-origin data from memory
    # Defense: Require explicit CORS headers to embed resources
    # Value: require-corp = Require Cross-Origin-Resource-Policy header
    # Effect: Prevents embedding without explicit permission
    # Use Case: Protects against cross-origin data leakage
    # Trade-off: Requires resources to set CORP headers
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    
    # 📌 CROSS-ORIGIN-OPENER-POLICY (Isolate Window Context)
    # Purpose: Isolate window.opener access between cross-origin pages
    # Attack: Malicious page opens your site and steals via opener
    # Value: same-origin = Only same-origin pages can access opener
    # Benefit: Prevents cross-origin opener attacks
    # Impact: Cross-origin popups lose opener reference
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    
    # 📌 CROSS-ORIGIN-RESOURCE-POLICY (Prevent Cross-Origin Requests)
    # Purpose: Prevent cross-origin sites from loading your resources
    # Value: same-site = Allow same-site origins only
    # Alternatives:
    #   - same-site: Same domain/subdomain can access
    #   - same-origin: Exact same origin only
    #   - cross-origin: Allow any cross-origin (disabled protection)
    # Example: google.com cannot load your API responses
    add_header Cross-Origin-Resource-Policy "same-site" always;
    
    # 📌 STRICT-TRANSPORT-SECURITY (Force HTTPS)
    # Attack: Attacker intercepts HTTP (downgrades to HTTP from HTTPS)
    # Defense: Browser always uses HTTPS for future visits
    # Value: max-age=31536000 = 1 year in seconds
    # includeSubDomains: Apply to all subdomains (*.example.com)
    # preload: Include in HSTS preload list (browsers ship with list)
    # Caution: 1-year commitment (cannot downgrade to HTTP)
    # Enable: Only AFTER successfully migrating to HTTPS
    # Warning: Typos here cause permanent issues for 1 year
    # Procedure: Start with max-age=300s (5 min), then increase gradually
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # 📌 CONTENT-SECURITY-POLICY (Prevent XSS, Injection Attacks)
    # Purpose: Define which resources browser can load (whitelist approach)
    # Attack: Injected <script> tag can load malicious JS from anywhere
    # Defense: default-src 'self' = Only load resources from same origin
    # Directives:
    #   default-src: Fallback for all resource types
    #   script-src: Where scripts can load from
    #   style-src: Where stylesheets can load from
    #   img-src: Where images can load from
    #   font-src: Where fonts can load from
    #   connect-src: Where AJAX/WebSocket can connect
    #   frame-ancestors: Who can embed in iframe (similar to X-Frame-Options)
    #   base-uri: Which URLs are allowed for <base>
    #   form-action: Where forms can submit
    # Values:
    #   'self': Same origin only
    #   'unsafe-inline': Allow inline scripts/styles (reduces security)
    #   'unsafe-eval': Allow eval() (reduces security)
    #   https://trusted.com: Allow specific domain
    # Example: Allow Google Analytics, prevent inline scripts
    # Customize: Based on your actual CDN/resource URLs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.routeops.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.routeops.com wss://ws.routeops.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # ===========================================================
    # UPSTREAMS FOR ALL MICROSERVICES (40-60 services)
    # ===========================================================
    
    # DNS-based service discovery for Kubernetes
    # Format: server <service-name>.<namespace>.svc.cluster.local:port
    
    # Core Services (Always available)
    upstream auth_service {
        zone auth_service 512k;
        least_conn;
        keepalive 320;
        keepalive_requests 10000;
        keepalive_timeout 60s;
        
        # Kubernetes endpoints (auto-updated via service discovery)
        server auth-service.payment.svc.cluster.local:8080 resolve;
        server auth-service.orders.svc.cluster.local:8080 resolve;
        server auth-service.user.svc.cluster.local:8080 resolve;
        
        # Health checks
        health_check interval=5s fails=3 passes=2 uri=/health;
    }
    
    upstream routing_service {
        zone routing_service 512k;
        least_time last_byte;
        keepalive 500;
        
        server routing-service.routing.svc.cluster.local:8081 resolve;
        server routing-service-2.routing.svc.cluster.local:8081 resolve;
        server routing-service-3.routing.svc.cluster.local:8081 resolve;
        
        health_check interval=3s fails=2 passes=2 uri=/health;
    }
    
    upstream ride_service {
        zone ride_service 1m;
        random two least_conn;
        keepalive 1000;
        
        server ride-service.rides.svc.cluster.local:8082 resolve;
        
        health_check interval=2s fails=2 passes=3 uri=/health;
    }
    
    upstream payment_service {
        zone payment_service 512k;
        hash $http_x_user_id consistent;
        keepalive 200;
        
        server payment-service.payment.svc.cluster.local:8083 resolve;
        
        health_check interval=5s fails=3 passes=2 uri=/health;
    }
    
    upstream notification_service {
        zone notification_service 256k;
        
        server notification-service.notification.svc.cluster.local:8084 resolve;
        
        health_check interval=10s fails=3 passes=2 uri=/health;
    }
    
    # Add 35+ more upstreams for other microservices...
    # Use include directive to manage separate upstream files
    include /etc/nginx/upstreams/*.conf;
    
    # ===========================================================
    # MAPS FOR DYNAMIC ROUTING
    # ===========================================================
    
    # Route based on path prefix
    map $uri $backend_service {
        ~^/api/v1/auth/     auth_service;
        ~^/api/v1/routing/  routing_service;
        ~^/api/v1/rides/    ride_service;
        ~^/api/v1/payment/  payment_service;
        ~^/api/v1/notify/   notification_service;
        default             fallback_service;
    }
    
    # Dynamic upstream selection based on request header
    map $http_x_service_name $custom_backend {
        "auth"    auth_service;
        "routing" routing_service;
        "ride"    ride_service;
        "payment" payment_service;
        default   routing_service;
    }
    
    # Canary deployment routing (5% to new version)
    map $http_x_canary $canary_backend {
        default   ride_service_v1;
        "true"    ride_service_v2;
    }
    
    # Geographic routing (PAN India regions)
    map $geoip2_city $region_backend {
        default         central_gateway;
        "Mumbai"        west_gateway;
        "Delhi"         north_gateway;
        "Bengaluru"     south_gateway;
        "Kolkata"       east_gateway;
        "Chennai"       south_gateway;
        "Hyderabad"     south_gateway;
        "Pune"          west_gateway;
        "Ahmedabad"     west_gateway;
    }
    
    # ===========================================================
    # SSL/TLS CONFIGURATION (For HTTPS termination)
    # ===========================================================
    
    # SSL session cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Modern TLS protocols only
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Strong cipher suites
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    
    # ===========================================================
    # REAL IP AND PROTOCOL CONFIGURATION
    # ===========================================================
    
    # Trusted proxies (Cloudflare, AWS ALB, etc.)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 103.21.244.0/22;  # Cloudflare India
    set_real_ip_from 103.22.200.0/22;  # Cloudflare India
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    # ===========================================================
    # VARIABLES FOR TRACING AND MONITORING
    # ===========================================================
    
    # Request ID generation
    map $http_x_request_id $request_id_generated {
        default $http_x_request_id;
        "" $request_id;
    }
    
    # Predefined variable for request_id (if not provided)
    set $request_id $request_id_generated;
    
    # Log condition for sampling (log 1% of requests for analytics)
    set $loggable 0;
    if ($request_time > 0.5) {
        set $loggable 1;
    }
    if ($status >= 400) {
        set $loggable 1;
    }
    
    # ===========================================================
    # SERVER BLOCK FOR MAIN GATEWAY
    # ===========================================================
    
    server {
        listen 80 default_server reuseport backlog=4096;
        listen [::]:80 default_server reuseport backlog=4096;
        listen 443 ssl http2 default_server reuseport backlog=4096;
        listen [::]:443 ssl http2 default_server reuseport backlog=4096;
        
        # Server names
        server_name api.routeops.com *.routeops.com;
        
        # SSL certificates
        ssl_certificate /etc/nginx/ssl/routeops.crt;
        ssl_certificate_key /etc/nginx/ssl/routeops.key;
        
        # Root and index
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # =======================================================
        # LOCATION BLOCKS FOR DIFFERENT SERVICES
        # =======================================================
        
        # Health check endpoint (no logging, no rate limiting)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Metrics endpoint for Prometheus
        location /metrics {
            access_log off;
            stub_status;
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
        
        # API Gateway - main entry point
        location /api/ {
            # Rate limiting
            limit_req zone=global_limit burst=200 nodelay;
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn conn_per_ip 50;
            
            # Apply different limits for authenticated vs unauthenticated
            if ($http_authorization) {
                limit_req zone=user_limit burst=100;
                set $auth_required true;
            }
            
            # Proxy headers
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-User-ID $http_x_user_id;
            proxy_set_header X-Trace-ID $http_x_trace_id;
            
            # Connection reuse
            proxy_set_header Connection "";
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_busy_buffers_size 16k;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Retry logic
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
            
            # Redis caching (for read-heavy endpoints)
            set $bypass_cache 0;
            if ($request_method != GET) {
                set $bypass_cache 1;
            }
            
            proxy_cache_key "$scheme$request_method$host$request_uri$http_x_user_id";
            proxy_cache mem_cache;
            proxy_cache_valid 200 302 60s;
            proxy_cache_valid 404 1m;
            proxy_cache_valid 500 502 503 504 0s;
            proxy_cache_bypass $bypass_cache;
            proxy_no_cache $bypass_cache;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Cache-TTL $upstream_cache_valid;
            
            # Dynamic routing to appropriate service
            proxy_pass http://$backend_service;
        }
        
        # WebSocket support for real-time features
        location /ws/ {
            proxy_pass http://websocket_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }
        
        # Static assets (CDN-like caching)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Pragma public;
            add_header Vary Accept-Encoding;
            
            # Brotli pre-compressed files
            brotli_static on;
            gzip_static on;
            
            access_log off;
            log_not_found off;
            tcp_nodelay off;
            
            # Offload to disk for large files
            directio 4m;
        }
        
        # Fallback for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache HTML with shorter TTL
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }
        
        # =======================================================
        # ERROR PAGES
        # =======================================================
        
        error_page 400 /400.html;
        error_page 401 /401.html;
        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
    
    # ===========================================================
    # REGIONAL GATEWAYS (For PAN India deployment)
    # ===========================================================
    
    # West India Gateway (Mumbai/Pune)
    server {
        listen 80;
        server_name west.routeops.com;
        
        location / {
            proxy_pass http://west_gateway;
            proxy_set_header X-Region "west";
            # ... standard proxy settings
        }
    }
    
    # North India Gateway (Delhi/NCR)
    server {
        listen 80;
        server_name north.routeops.com;
        
        location / {
            proxy_pass http://north_gateway;
            proxy_set_header X-Region "north";
        }
    }
    
    # South India Gateway (Bengaluru/Chennai/Hyderabad)
    server {
        listen 80;
        server_name south.routeops.com;
        
        location / {
            proxy_pass http://south_gateway;
            proxy_set_header X-Region "south";
        }
    }
    
    # East India Gateway (Kolkata)
    server {
        listen 80;
        server_name east.routeops.com;
        
        location / {
            proxy_pass http://east_gateway;
            proxy_set_header X-Region "east";
        }
    }
    
    # ===========================================================
    # CANARY & A/B TESTING SERVER
    # ===========================================================
    
    server {
        listen 80;
        server_name canary.routeops.com;
        
        location /api/ {
            # Split traffic based on cookie or header
            if ($http_x_experiment = "new-feature") {
                proxy_pass http://canary_backend;
                break;
            }
            proxy_pass http://stable_backend;
        }
    }
    
    # ===========================================================
    # ADMIN & MONITORING SERVER (Internal only)
    # ===========================================================
    
    server {
        listen 8080;
        server_name admin.routeops.com;
        
        location / {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            # Basic auth
            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }
        
        # Real-time metrics dashboard
        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format html;
        }
        
        # Cache purge endpoint
        location ~ /purge(/.*) {
            allow 10.0.0.0/8;
            deny all;
            proxy_cache_purge mem_cache "$scheme$request_method$host$1";
        }
        
        # Configuration testing endpoint
        location /reload {
            allow 10.0.0.0/8;
            deny all;
            content_by_lua_block {
                os.execute("nginx -s reload");
                ngx.say("Reloaded");
            }
        }
    }
}

# ===================================================================
# STREAM CONTEXT (TCP/UDP Load Balancing for gRPC, MySQL, Redis, etc.)
# ===================================================================
stream {
    # ===========================================================
    # gRPC Load Balancing (for service-to-service communication)
    # ===========================================================
    
    upstream grpc_backend {
        zone grpc_backend 512k;
        least_conn;
        
        server grpc-service-1.payment.svc.cluster.local:50051;
        server grpc-service-2.payment.svc.cluster.local:50051;
        
        health_check interval=5s fails=3 passes=2 grpc_type health_check;
    }
    
    server {
        listen 50051 http2;
        proxy_pass grpc_backend;
        proxy_timeout 30s;
        proxy_next_upstream on;
        
        # SSL for gRPC
        ssl_certificate /etc/nginx/ssl/grpc.crt;
        ssl_certificate_key /etc/nginx/ssl/grpc.key;
    }
    
    # ===========================================================
    # MySQL/MariaDB Load Balancing
    # ===========================================================
    
    upstream mysql_cluster {
        zone mysql_cluster 256k;
        least_time first_byte;
        
        server mysql-master.db.svc.cluster.local:3306 weight=2;
        server mysql-slave-1.db.svc.cluster.local:3306 weight=1;
        server mysql-slave-2.db.svc.cluster.local:3306 weight=1;
        
        health_check interval=10s passes=2;
    }
    
    server {
        listen 3306;
        proxy_pass mysql_cluster;
        proxy_timeout 1h;
        proxy_connect_timeout 5s;
    }
    
    # ===========================================================
    # Redis Cluster Load Balancing
    # ===========================================================
    
    upstream redis_cluster {
        zone redis_cluster 128k;
        hash $remote_addr consistent;
        
        server redis-0.cache.svc.cluster.local:6379;
        server redis-1.cache.svc.cluster.local:6379;
        server redis-2.cache.svc.cluster.local:6379;
        
        health_check interval=5s passes=2;
    }
    
    server {
        listen 6379;
        proxy_pass redis_cluster;
        proxy_timeout 30s;
    }
    
    # ===========================================================
    # Kafka Load Balancing
    # ===========================================================
    
    upstream kafka_cluster {
        zone kafka_cluster 512k;
        least_conn;
        
        server kafka-0.kafka.svc.cluster.local:9092;
        server kafka-1.kafka.svc.cluster.local:9092;
        server kafka-2.kafka.svc.cluster.local:9092;
    }
    
    server {
        listen 9092;
        proxy_pass kafka_cluster;
        proxy_protocol on;
        proxy_timeout 300s;
    }
    
    # ===========================================================
    # Elasticsearch Load Balancing
    # ===========================================================
    
    upstream elasticsearch_cluster {
        zone elasticsearch_cluster 256m;
        
        server elasticsearch-0.logging.svc.cluster.local:9200;
        server elasticsearch-1.logging.svc.cluster.local:9200;
        server elasticsearch-2.logging.svc.cluster.local:9200;
    }
    
    server {
        listen 9200;
        proxy_pass elasticsearch_cluster;
        proxy_timeout 60s;
    }
}

# ===================================================================
# ADDITIONAL MASTER CONTEXT CONFIGURATIONS
# ===================================================================

# Load balancing algorithm configuration
upstream fallback_service {
    ip_hash;  # Session persistence
    server fallback-api-1.routeops.com:8080 down;
    server fallback-api-2.routeops.com:8080 backup;
}

# Circuit breaker configuration (via Lua script)
init_by_lua_block {
    -- Circuit breaker tracking
    local failures = {}
    local last_failure_time = {}
    
    function circuit_breaker_check(upstream)
        if failures[upstream] and failures[upstream] > 5 then
            if os.time() - last_failure_time[upstream] < 60 then
                ngx.log(ngx.WARN, "Circuit breaker open for ", upstream)
                return false
            else
                failures[upstream] = 0
            end
        end
        return true
    end
    
    function circuit_breaker_record_failure(upstream)
        failures[upstream] = (failures[upstream] or 0) + 1
        last_failure_time[upstream] = os.time()
    end
}

# ===================================================================
# MAINTENANCE MODE CONFIGURATION
# ===================================================================
server {
    listen 80;
    server_name maintenance.routeops.com;
    
    location / {
        return 503;
        add_header Retry-After 3600;
        add_header Content-Type text/html;
        
        # Maintenance page
        root /usr/share/nginx/html;
        try_files /maintenance.html =503;
        
        # Allow admin IPs
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }
}

# ===================================================================
# NOTES FOR DEPLOYMENT:
# ===================================================================
# 1. Adjust worker_processes and worker_connections based on your servers
# 2. Tune cache sizes based on available memory (leave 20% for OS)
# 3. Enable Brotli module for better compression (install nginx-module-brotli)
# 4. Set up proper SSL certificates from CA (not self-signed)
# 5. Configure GEOIP2 database for India regions
# 6. Implement ConfigMap for Kubernetes deployment
# 7. Set up log rotation with logrotate (daily, compress, rotate 30)
# 8. Monitor with Prometheus + Grafana using nginx-vts-exporter
# 9. Implement canary deployments with weighted routing
# 10. Use nginx-unit for dynamic configuration updates (zero downtime)
# ===================================================================